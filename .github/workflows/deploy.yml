name: deploy

on:
  workflow_run:
    workflows: ["test"]
    branches:
      - main
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}  # only deploy if tests passed
    steps:
      - name: Trigger Streamlit deploy
        run: |
          curl -X POST "${{ secrets.STREAMLIT_DEPLOY_HOOK_URL }}"