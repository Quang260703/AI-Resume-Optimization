name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # Check code quality first (reuse your existing job)
  code-quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Quality Suite
        run: make check

  # Deploy to Streamlit only if quality checks pass
  deploy:
    runs-on: ubuntu-22.04
    needs: code-quality   # gates on the quality job
    steps:
      - name: Trigger Streamlit deploy
        run: |
          curl -X POST "${{ secrets.STREAMLIT_DEPLOY_HOOK_URL }}"