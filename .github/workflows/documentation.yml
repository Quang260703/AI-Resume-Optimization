name: documentation
 
on:
  push:
    branches:
    - main
 
jobs:
  code-quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'
      - run: pip install ruff mypy
      - run: make check
 
  build-docs:
    needs: code-quality
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'
      - run: pip install mkdocs==1.4.2 mkdocstrings==0.21.2 "mkdocstrings[python]>=0.18"
      - name: Deploy documentation
        run: mkdocs gh-deploy --force
 